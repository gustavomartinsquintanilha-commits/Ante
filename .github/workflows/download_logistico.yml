name: Download Logistico

on:
  workflow_dispatch:  # Permite execucao manual
  # schedule:
  #   - cron: '0 8 * * *'  # Descomente para agendar (ex: todo dia 8h UTC)

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Executar download_logistico.py
        run: python download_logistico.py
        env:
          HEADLESS: "true"

      - name: Upload arquivo baixado
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: logistico-xls
          path: |
            **/*.xls
            **/*.xlsx
          if-no-files-found: warn
          retention-days: 7

      - name: Upload screenshots de debug
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-debug
          path: screenshots/
          if-no-files-found: warn
          retention-days: 7
