name: Download Logistico

on:
  workflow_dispatch:  # Permite execucao manual
  # schedule:
  #   - cron: '0 8 * * *'  # Descomente para agendar (ex: todo dia 8h UTC)

jobs:
  download:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Debug - Inspecionar HTML do site
        run: |
          echo "PWD: $(pwd)"
          ls -la
          python debug_html.py
          echo "--- Debug output ---"
          ls -la debug_output/ || echo "debug_output nao existe"
        env:
          HEADLESS: "true"
        timeout-minutes: 3

      - name: Upload debug output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: debug-output
          path: |
            debug_output/
            **/debug_output/
          if-no-files-found: warn
          retention-days: 7
