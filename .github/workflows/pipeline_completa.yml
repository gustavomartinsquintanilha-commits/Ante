name: Pipeline Completa VSR v1.1

on:
  workflow_dispatch:  # Permite execucao manual
  schedule:
    - cron: '0 12 * * 4'  # Toda quinta-feira as 09:00 (horario de Brasilia = 12:00 UTC)

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar ODBC Driver 18 e openfortivpn
        run: |
          sudo apt-get update
          sudo apt-get install -y openfortivpn unixodbc-dev
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Conectar VPN (FortiGate SSL)
        run: |
          CERT_HASH="92782b4f0bf72089ee27b368ae824d955c432528ce4cdb9b9a178d0c23762b8a"
          echo "[VPN] Conectando a 8.243.35.166:443..."
          
          # Conecta VPN com hash em minusculas
          sudo openfortivpn 8.243.35.166:443 \
            -u gustavo.martins \
            -p 'Ljkaus*&2025' \
            --trusted-cert=$CERT_HASH \
            > /tmp/vpn.log 2>&1 &
          VPN_PID=$!
          echo "[VPN] PID: $VPN_PID"
          
          # Aguarda até 30s pelo tunnel ppp0 ficar UP com IP
          for i in $(seq 1 30); do
            if ip addr show ppp0 2>/dev/null | grep -q "inet "; then
              echo "[VPN] ppp0 com IP apos ${i}s!"
              break
            fi
            if ! kill -0 $VPN_PID 2>/dev/null; then
              echo "[VPN] ERRO - processo morreu!"
              cat /tmp/vpn.log
              break
            fi
            echo "[VPN] Aguardando ppp0 IP... (${i}s)"
            sleep 1
          done
          
          # Mostra IP do ppp0
          echo "=== INTERFACES ==="
          ip addr show ppp0 2>/dev/null || echo "ppp0 NAO encontrado"
          
          # Adiciona rota para rede interna via ppp0
          if ip link show ppp0 > /dev/null 2>&1; then
            sudo ip route add 192.168.40.0/24 dev ppp0 2>/dev/null || echo "[VPN] Rota ja existe ou falhou"
            echo "[VPN] Rota adicionada: 192.168.40.0/24 via ppp0"
          fi
          
          echo "=== ROTAS ==="
          ip route
          echo "=== VPN LOG ==="
          cat /tmp/vpn.log 2>/dev/null | tail -10
          echo "=== TESTE ==="
          ping -c 3 -W 5 192.168.40.30 && echo "[VPN] OK!" || echo "[VPN] WARN - ping falhou"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Criar diretorios de output
        run: |
          mkdir -p output
          mkdir -p screenshots
          mkdir -p relatorios_envio

      - name: Executar R_Geral.py (pipeline completa)
        run: python R_Geral.py
        env:
          HEADLESS: "true"
        timeout-minutes: 15

      - name: Upload arquivos baixados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arquivos-baixados
          path: |
            output/
            **/*.xls
            **/*.xlsx
          if-no-files-found: warn
          retention-days: 7

      - name: Upload relatorios gerados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorios-gerados
          path: |
            relatorios_envio/
            output/
          if-no-files-found: warn
          retention-days: 7

      - name: Upload screenshots de debug
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-debug
          path: screenshots/
          if-no-files-found: warn
          retention-days: 7
