name: Pipeline Completa VSR

on:
  workflow_dispatch:  # Permite execucao manual
  # schedule:
  #   - cron: '0 8 * * *'  # Descomente para agendar (ex: todo dia 8h UTC)

jobs:
  pipeline:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout codigo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar ODBC Driver 18 e openfortivpn
        run: |
          sudo apt-get update
          sudo apt-get install -y openfortivpn unixodbc-dev
          sudo ACCEPT_EULA=Y apt-get install -y msodbcsql18

      - name: Instalar dependencias Python
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Conectar VPN (FortiGate SSL)
        run: |
          CERT_HASH="92782b4f0bf72089ee27b368ae824d955c432528ce4cdb9b9a178d0c23762b8a"
          echo "[VPN] Conectando a 8.243.35.166:443..."
          
          # Conecta VPN com hash em minusculas
          sudo openfortivpn 8.243.35.166:443 \
            -u gustavo.martins \
            -p 'Ljkaus*&2025' \
            --trusted-cert=$CERT_HASH \
            > /tmp/vpn.log 2>&1 &
          VPN_PID=$!
          echo "[VPN] PID: $VPN_PID"
          
          # Aguarda até 30s pelo tunnel (ppp0)
          for i in $(seq 1 30); do
            if ip link show ppp0 > /dev/null 2>&1; then
              echo "[VPN] Tunnel ppp0 ativo apos ${i}s!"
              break
            fi
            if ! kill -0 $VPN_PID 2>/dev/null; then
              echo "[VPN] ERRO - processo morreu!"
              cat /tmp/vpn.log
              break
            fi
            sleep 1
          done
          
          # Mostra status
          echo "=== VPN LOG ==="
          cat /tmp/vpn.log 2>/dev/null | tail -20
          echo "=== INTERFACES ==="
          ip addr show ppp0 2>/dev/null || echo "ppp0 NAO encontrado"
          echo "=== ROTAS ==="
          ip route
          echo "=== TESTE ==="
          ping -c 2 -W 3 192.168.40.30 && echo "[VPN] OK!" || echo "[VPN] WARN - ping falhou"

      - name: Setup Chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Setup ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Criar diretorios de output
        run: |
          mkdir -p output
          mkdir -p screenshots
          mkdir -p relatorios_envio

      - name: Executar R_Geral.py (pipeline completa)
        run: python R_Geral.py
        env:
          HEADLESS: "true"
        timeout-minutes: 15

      - name: Upload arquivos baixados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: arquivos-baixados
          path: |
            output/
            **/*.xls
            **/*.xlsx
          if-no-files-found: warn
          retention-days: 7

      - name: Upload relatorios gerados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorios-gerados
          path: |
            "Envio de e-mail - VSR/relatorios/"
            "Reporte - Logistico/Base/"
          if-no-files-found: warn
          retention-days: 7

      - name: Upload screenshots de debug
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-debug
          path: screenshots/
          if-no-files-found: warn
          retention-days: 7
